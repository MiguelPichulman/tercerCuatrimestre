<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <main>
        <div class="login-card">
            <h1 class="login-card__tittle">food store</h1>
            <h2 class="login-card__function">Iniciar Sesión</h2>
            <section>
                <form action="#">

                    <label for="Email">Email:</label>
                    <input id="Email" type="email" placeholder="Ej: tucorreo@ejemplo.com" required>

                    <label for="Contraseña">Contraseña:</label>
                    <input id="Contraseña" type="password" placeholder="Minimo. 8 caracteres" required>

                    <button class="boton" type="submit">Ingresar</button>

                    <p>¿No tenes cuenta? <a href="#" class="link">Registrate aca</a></p>
                </form>
            </section>

        </div>

    </main>
</body>
</html>
