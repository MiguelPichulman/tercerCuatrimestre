<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <main class="login-card">
        <h1 class="login-card__tittle">FOOD STORE</h1>
        <h2 class="login-card__function">Iniciar Sesión</h2>

        <form id="Loginform">

            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" required placeholder="ejemplo@ejemplo.com">
            </div>
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" required placeholder="********">
            </div>
            
            <button type="submit" class="boton">Ingresar</button>

            <p>¿No tenes cuenta? <a href="../registro/registro.html" class="link">Registrate aca</a></p>

        </form>
    </main>

    <script type="module" src="./login.ts"></script>
</body>

</html>
