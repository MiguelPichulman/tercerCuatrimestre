<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Registro</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>
    <main>
        <div class="login-card">
            <h1 class="login-card__tittle">food store</h1>
            <h2 class="login-card__function">Crear Cuenta</h2>
            <section>
                <form id="registroForm">

                    <label for="email">Email:</label>
                    <input id="email" type="email" placeholder="Ej: tucorreo@ejemplo.com" required>

                    <label for="password">Contraseña:</label>
                    <input id="password" type="password" placeholder="Minimo. 8 caracteres" required>

                    <label for="rol">Seleccionar Rol:</label>
                    <select id="rol" required>
                        <option value="client">Cliente</option>
                        <option value="admin">Administrador</option>
                    </select>

                    <button class="boton" type="submit">Registrar</button>
                </form>
            </section>

        </div>

    </main>
    <script type="module" src="./registro.ts"></script>
</body>
</html>
